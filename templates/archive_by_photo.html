{% extends 'base.html' %}

{% block meta-title %}
    <meta name="og:title" content="Photo Archive">
{% endblock %}

{% block page-content %}

<main id="main">

  <div class="breadcrumbs">
    <nav>
      <div class="container">
        <ol>
          <li><a href="{% url 'app-index' %}">Home</a></li>
          <li>Photo Archive</li>
        </ol>
      </div>
    </nav>
  </div>

  <section id="portfolio" class="portfolio sections-bg">
    <div class="section-header">
      <h2><span class="bi bi-camera-video-fill"></span> Photo Archives</h2>
    </div>

    <div class="container" data-aos="fade-up">
      <div class="portfolio-isotope" data-portfolio-filter="*" data-portfolio-layout="masonry" data-portfolio-sort="original-order" data-aos="fade-up" data-aos-delay="100">
        <form
          class="row"
          method="get"
          hx-get="{% url 'archive-photo' %}"
          hx-target="#photo-archive-results"
          hx-swap="innerHTML"
          hx-push-url="true"
          hx-indicator="#page-shell-indicator"
        >
          <div class="col-lg-4"></div>
          <div class="col-lg-4">
            <div class="form-group">
              <label for="archive-woreda"><span class="fa fa-search" style="color: blue;"></span> Filter By Woreda</label>
              <select class="selectpicker form-control" data-live-search="true" name="woreda" id="archive-woreda" onchange="this.form.requestSubmit()">
                <option value="">Search By Woreda</option>
                {% for item in woreda_list %}
                <option value="{{ item.woreda_name }}" {% if woreda == item.woreda_name %}selected{% endif %}>{{ item.woreda_name }}</option>
                {% endfor %}
              </select>
            </div>
            <br><br>
          </div>
        </form>

        <div id="photo-archive-results">
          {% include 'public_partials/photo_archive_results.html' %}
        </div>
      </div>
    </div>
  </section>
</main>

{% endblock %}
