{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tigray Genocide</title>
    <!-- Bootstrap -->
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %} " rel="stylesheet">
    <!-- Font Awesome -->
    <link href="{% static 'fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    <!-- NProgress -->
    <script src="{% static 'admin_static/css/nprogress.css' %}"></script>

    <!-- Custom Theme Style -->
    <link href="{% static 'admin_static/css/custom.min.css' %}" rel="stylesheet">
</head>

<body class="login">
    <div>
        <a class="hiddenanchor" id="signup"></a>
        <a class="hiddenanchor" id="signin"></a>

        <div class="login_wrapper">
            <div class="animate form login_form">
                <section class="login_content">
                    <h1>Tigray Genocide</h1>

                    {% if messages %}
                    {% for message in messages %}
                    {% if message.tags == 'success' %}
                    <div class="alert alert-success alert-dismissible " role="alert">
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        </button>
                        <span class="fa fa-check-circle"></span> {{ message }}
                    </div>
                    {% else %}
                    <div class="alert alert-danger alert-dismissible " role="alert">
                        <button type="button" class="close" data-dismiss="alert">
                        </button>
                        <span class="fa fa-question-circle"></span> {{ message }}
                    </div>
                    {% endif %}
                    {% endfor %}
                    {% endif %}

                    <form action="" method="POST" data-parsley-validate>
                        {% csrf_token %}
                        <div>
                            <input type="text" id="login_username" name="login_username" class="form-control"
                                placeholder="Username" required="" />
                        </div>
                        <div>
                            <input type="password" id="login_password" name="login_password" class="form-control"
                                placeholder="Password" required="" />
                        </div>

                        {{ captcha_form.as_p }}

                        <div>
                            <button class="btn btn-dark btn-block btn-outline" type="submit">Login</button>
                            <a class="reset_pass" href="{% url 'reset_password' %}">Lost your password?</a>
                        </div>
                    </form>

                    <div class="clearfix"></div>

                    <div class="separator">

                        <div class="clearfix"></div>
                        <br />

                        <div>
                            &copy; <span id="copyright_year"></span> Tigray Genocide</a>
                        </div>
                    </div>
                </section>
            </div>

        </div>
    </div>

    <script>
        const currentYear = new Date().getFullYear();
        document.getElementById('copyright_year').innerHTML = currentYear;
    </script>

  <!-- Parsely validation -->
  <script src="{% static 'admin_static/js/parsley.min.js' %}"></script>
</body>

</html>
