{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tigray Genocide</title>
    <!-- Bootstrap -->
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %} " rel="stylesheet">
    <!-- Font Awesome -->
    <link href="{% static 'fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    <!-- NProgress -->
    <script src="{% static 'admin_static/css/nprogress.css' %}"></script>

    <!-- Custom Theme Style -->
    <link href="{% static 'admin_static/css/custom.min.css' %}" rel="stylesheet">
</head>

<style>
    input {
        display: block;
        width: 100%;
        padding: .375rem .75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        border-radius: .375rem;
        transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
    }
</style>

<body class="login">
    <div>
        <a class="hiddenanchor" id="signup"></a>
        <a class="hiddenanchor" id="signin"></a>

        <div class="login_wrapper">
            <div class="animate form login_form">
                <section class="login_content">
                    <h1>Reset Password</h1>

                    {% if messages %}
                    {% for message in messages %}
                    {% if message.tags == 'success' %}
                    <div class="alert alert-success alert-dismissible " role="alert">
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        </button>
                        <span class="fa fa-check-circle"></span> {{ message }}
                    </div>
                    {% else %}
                    <div class="alert alert-danger alert-dismissible " role="alert">
                        <button type="button" class="close" data-dismiss="alert">
                        </button>
                        <span class="fa fa-question-circle"></span> {{ message }}
                    </div>
                    {% endif %}
                    {% endfor %}
                    {% endif %}

                    <form action="" method="POST" data-parsley-validate>
                        {% csrf_token %}
                        {{ form.as_p }}

                        <div>
                            <button class="btn btn-dark" type="submit">Submit</button>
                        </div>
                    </form>

                    <div class="clearfix"></div>

                    <div class="separator">

                        <div class="clearfix"></div>
                        <br />

                        <div>
                            &copy; <span id="copyright_year"></span> Tigray Genocide</a>
                        </div>
                    </div>
                </section>
            </div>

        </div>
    </div>

    <script>
        const currentYear = new Date().getFullYear();
        document.getElementById('copyright_year').innerHTML = currentYear;
    </script>

</body>

</html>
