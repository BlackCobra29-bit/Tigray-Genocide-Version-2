<div id="{{ section_id|default:'victim-photo-section' }}">
  <div class="portfolio-isotope" data-portfolio-filter="*" data-portfolio-layout="masonry" data-portfolio-sort="original-order" data-aos="fade-up" data-aos-delay="100">
    <div id="victim-photo-grid" class="row gy-4 portfolio-container">
      {% include 'public_partials/victim_photo_cards.html' %}
    </div>

    <div id="victim-photo-load-more" class="text-center mt-4">
      {% if page_obj.has_next %}
      <button
        class="btn btn-outline-dark"
        hx-get="{% url 'civilian-victim-photo-page' %}?{{ next_querystring }}&append=1"
        hx-target="#victim-photo-grid"
        hx-swap="beforeend"
        hx-indicator="#page-shell-indicator"
      >
        Load More
      </button>
      {% endif %}
    </div>
  </div>
</div>
